- name: datatypes
  hosts: local
  connection: local
  vars:
    course: "devops with aws" #string
    duration: 120 #number
    is_live: true #boolean
    tools: # ["linux","shell","ansible"] #list
        - shell
        - linux
        - ansible
    concepts:
      cloud: aws
      cm: ansible
  tasks:
    - name: print the course info
      ansible.builtin.debug:
        msg: "course name  is: {{ course }}, duration: {{ duration }}, is it live?: {{ is_live }},tools are: {{ tools }}, concepts are: {{ concepts }}"


    
